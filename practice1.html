<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // flag 변수
        let isChanged = false;

        function changeH1() {
            if (!isChanged) {
                h1.textContent = "Hello, JS";
                h1.style.color = "red";
            } else {
                h1.textContent = "Hello";
                h1.style.color = "black";
            }

            isChanged = !isChanged;
        };

        button.addEventListener("click", changeH1);
    </script>
</body>

</html>
